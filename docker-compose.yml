version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: ella3eba-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ella3eba
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ella3eba-redis
    ports:
      - "6380:6379"
    restart: always

volumes:
  postgres_data:
